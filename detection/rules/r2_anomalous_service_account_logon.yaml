id: "r2-anomalous-service-account-logon"
title: "Service Account Network Logon From Workstation Subnet"
description: |
  服务账户（svc_*）从终端工作站子网（10.0.3.0/24）发起网络登录，
  通常服务账户只应该从基础设施子网登录。这是凭证被盗后用于横向的常见模式。
author: "initial ruleset"
status: "stable"
level: "high"
logsource:
  channel: "Security"
  product: "windows"
event_ids: [4624]
detection:
  selection:
    EventData.TargetUserName|startswith: "svc_"
    EventData.LogonType: "3"
    EventData.IpAddress|startswith: "10.0.3."
  condition: "selection"
tags:
  - "attack.t1078"
  - "attack.lateral_movement"
ontology_refs:
  nodes: [Account, Host]
  edges: [logged_into, authenticated_as]
